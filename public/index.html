<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Template</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="bar topbar">
      <div class="container topbar-content">
        <a class="logo-slot" href="#" aria-label="Logo placeholder">Logo</a>
        <div class="top-actions">
          <button class="btn theme-toggle" type="button" aria-label="Toggle color theme">Theme</button>
          <a class="btn resume-link" href="resume.pdf">Resume</a>
        </div>
      </div>
    </header>

    <main class="container layout">
      <section class="hero">
        <h1>Your Name</h1>
        <p>Short one-line placeholder introduction.</p>
      </section>

      <section class="section" id="education">
        <h2>Education</h2>
        <div class="entries" data-source="education.json" data-kind="entry"></div>
      </section>

      <section class="section" id="experience">
        <h2>Experience</h2>
        <div class="entries" data-source="experience.json" data-kind="entry"></div>
      </section>

      <section class="section" id="projects">
        <h2>Projects</h2>
        <div class="entries" data-source="projects.json" data-kind="project"></div>
      </section>

      <section class="section">
        <h2>Volunteer</h2>
        <p>Group placeholder · Role placeholder · One-line contribution placeholder.</p>
      </section>

      <section class="section">
        <h2>Contact me</h2>
        <p>email@example.com</p>
      </section>
    </main>

    <footer class="bar bottombar">
      <div class="container bar-content footer-content">
        <p>© 2026 Your Name</p>
        <nav class="footer-links" aria-label="External profile links">
          <a class="btn" href="#" aria-label="Link one placeholder">Link one</a>
          <a class="btn" href="#" aria-label="Link two placeholder">Link two</a>
          <a class="btn" href="#" aria-label="Link three link placeholder">Link three</a>
          <a class="btn" href="mailto:email@example.com">Email</a>
        </nav>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
