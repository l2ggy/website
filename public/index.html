<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Template</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg class="icon-defs" aria-hidden="true" focusable="false">
      <symbol id="icon-resume" viewBox="0 0 24 24">
        <path d="M7 3h7l5 5v13H7z" fill="none" stroke="currentColor" stroke-width="1.7" />
        <path d="M14 3v6h5M10 12h6M10 16h6" fill="none" stroke="currentColor" stroke-width="1.7" />
      </symbol>
      <symbol id="icon-sun" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="1.7" />
        <path d="M12 2.7v2.3M12 19v2.3M2.7 12H5M19 12h2.3M5.4 5.4l1.6 1.6M17 17l1.6 1.6M18.6 5.4L17 7M7 17l-1.6 1.6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
      </symbol>
      <symbol id="icon-moon" viewBox="0 0 24 24">
        <path d="M15.7 3.5A8.9 8.9 0 1 0 20.5 16a8.1 8.1 0 0 1-4.8-12.5z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-linkedin" viewBox="0 0 24 24">
        <rect x="4.5" y="4.5" width="15" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="1.7" />
        <path d="M8 10v6M8 8.2v.1M12 16v-3.3c0-1.2.7-1.9 1.7-1.9s1.7.7 1.7 1.9V16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
      </symbol>
      <symbol id="icon-github" viewBox="0 0 24 24">
        <path d="M12 4.2a7.8 7.8 0 0 0-2.5 15.2c.4.1.5-.2.5-.4v-1.4c-2.1.5-2.5-.9-2.5-.9-.3-.8-.8-1.1-.8-1.1-.7-.4 0-.4 0-.4.8 0 1.2.8 1.2.8.7 1.2 1.8.8 2.2.6.1-.5.3-.8.5-1-1.7-.2-3.5-.9-3.5-3.9 0-.9.3-1.6.8-2.1 0-.2-.3-1 .1-2 0 0 .7-.2 2.3.8a7.7 7.7 0 0 1 4.2 0c1.6-1 2.3-.8 2.3-.8.4 1 .1 1.8.1 2 .5.5.8 1.2.8 2.1 0 3-1.8 3.7-3.5 3.9.3.3.5.7.5 1.5V19c0 .2.1.5.5.4A7.8 7.8 0 0 0 12 4.2z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-code" viewBox="0 0 24 24">
        <path d="M9 8 5 12l4 4M15 8l4 4-4 4M13 6l-2 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-email" viewBox="0 0 24 24">
        <rect x="4" y="6" width="16" height="12" rx="1.8" fill="none" stroke="currentColor" stroke-width="1.7" />
        <path d="m5 8 7 5 7-5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
      </symbol>
    </svg>

    <header class="bar topbar">
      <div class="container topbar-content">
        <a class="logo-slot" href="#" aria-label="Logo placeholder">Logo</a>
        <div class="topbar-actions">
          <button class="icon-btn" id="theme-toggle" type="button" aria-label="Toggle color mode" title="Toggle color mode">
            <svg viewBox="0 0 24 24"><use href="#icon-moon"></use></svg>
          </button>
          <a class="icon-btn" href="resume.pdf" aria-label="Resume" title="Resume">
            <svg viewBox="0 0 24 24"><use href="#icon-resume"></use></svg>
          </a>
        </div>
      </div>
    </header>

    <main class="container layout">
      <section class="hero">
        <h1>Your Name</h1>
        <p>One-page portfolio placeholder template.</p>
      </section>

      <section class="section" id="education">
        <h2>Education</h2>
        <div class="entries" data-source="education.json" data-kind="entry"></div>
      </section>

      <section class="section" id="experience">
        <h2>Experience</h2>
        <div class="entries" data-source="experience.json" data-kind="entry"></div>
      </section>

      <section class="section" id="projects">
        <h2>Projects</h2>
        <div class="entries" data-source="projects.json" data-kind="project"></div>
      </section>

      <section class="section">
        <h2>Volunteer</h2>
        <p>Organization placeholder · Role placeholder · Contribution placeholder</p>
      </section>

      <section class="section">
        <h2>Contact me</h2>
        <p>placeholder@email.com</p>
      </section>
    </main>

    <footer class="bar bottombar">
      <div class="container bar-content footer-content">
        <p>© 2026 Your Name</p>
        <nav class="footer-links" aria-label="External profile links">
          <a class="icon-btn" href="#" aria-label="LinkedIn" title="LinkedIn">
            <svg viewBox="0 0 24 24"><use href="#icon-linkedin"></use></svg>
          </a>
          <a class="icon-btn" href="#" aria-label="GitHub" title="GitHub">
            <svg viewBox="0 0 24 24"><use href="#icon-github"></use></svg>
          </a>
          <a class="icon-btn" href="#" aria-label="LeetCode" title="LeetCode">
            <svg viewBox="0 0 24 24"><use href="#icon-code"></use></svg>
          </a>
          <a class="icon-btn" href="mailto:placeholder@email.com" aria-label="Email" title="Email">
            <svg viewBox="0 0 24 24"><use href="#icon-email"></use></svg>
          </a>
        </nav>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
