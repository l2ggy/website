<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Template</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="bar topbar">
      <div class="container topbar-content">
        <a class="logo-slot" href="#" aria-label="Logo placeholder">Logo</a>
        <div class="topbar-actions">
          <button class="text-btn" id="theme-toggle" type="button" aria-label="Toggle color mode" title="Toggle color mode">
            Toggle theme
          </button>
          <a class="text-btn" href="resume.pdf" aria-label="Resume" title="Resume">Resume</a>
        </div>
      </div>
    </header>

    <main class="container layout">
      <section class="hero">
        <div class="hero-copy">
          <h1>Your Name</h1>
          <p>One-page portfolio placeholder template.</p>
        </div>
        <div class="hero-heatmap-wrap" data-github-user="l2ggy" aria-label="GitHub contribution heatmap">
          <img class="hero-heatmap" id="github-heatmap" src="" alt="GitHub contribution heatmap" loading="lazy" />
        </div>
      </section>

      <section class="section" id="education">
        <h2>Education</h2>
        <div class="entries" data-source="education.json" data-kind="entry"></div>
      </section>

      <section class="section" id="experience">
        <h2>Experience</h2>
        <div class="entries" data-source="experience.json" data-kind="entry"></div>
      </section>

      <section class="section" id="projects">
        <h2>Projects</h2>
        <div class="entries" data-source="projects.json" data-kind="project"></div>
      </section>

      <section class="section">
        <h2>Volunteer</h2>
        <p>Organization placeholder · Role placeholder · Contribution placeholder</p>
      </section>

      <section class="section">
        <h2>Contact me</h2>
        <p>placeholder@email.com</p>
      </section>
    </main>

    <footer class="bar bottombar">
      <div class="container bar-content footer-content">
        <p>© 2026 Your Name</p>
        <nav class="footer-links" aria-label="External profile links">
          <a class="text-btn" href="#" aria-label="LinkedIn" title="LinkedIn">LinkedIn</a>
          <a class="text-btn" href="#" aria-label="GitHub" title="GitHub">GitHub</a>
          <a class="text-btn" href="#" aria-label="LeetCode" title="LeetCode">LeetCode</a>
          <a class="text-btn" href="mailto:placeholder@email.com" aria-label="Email" title="Email">Email</a>
        </nav>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
