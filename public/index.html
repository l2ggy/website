<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boris Kafidov</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="bar topbar">
      <div class="container topbar-content">
        <a class="logo-slot" href="#" aria-label="Home">
          <img class="site-icon" src="/favicon.svg" alt="BK site icon" />
          <span>laggy</span>
        </a>
        <div class="topbar-actions">
          <button class="text-btn theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color mode" title="Toggle color mode">
            <svg class="theme-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle class="theme-icon__sun" cx="12" cy="12" r="4.2" />
              <path class="theme-icon__rays" d="M12 2.25v2.45M12 19.3v2.45M4.93 4.93l1.73 1.73M17.34 17.34l1.73 1.73M2.25 12h2.45M19.3 12h2.45M4.93 19.07l1.73-1.73M17.34 6.66l1.73-1.73" />
              <path class="theme-icon__moon" d="M14.4 3.6A8.4 8.4 0 1 0 20.4 16 7.05 7.05 0 1 1 14.4 3.6Z" />
            </svg>
            <span class="visually-hidden">Toggle color mode</span>
          </button>
          <a class="text-btn" href="resume.pdf" target="_blank" rel="noreferrer" aria-label="Resume" title="Resume">Resume</a>
        </div>
      </div>
    </header>

    <main class="container layout">
      <section class="hero">
        <div class="hero-copy">
          <h1 id="hero-name" tabindex="0">Boris Kafidov</h1>
          <p>swe | cs + math @ uoft</p>
        </div>
        <div class="hero-heatmap-wrap" data-github-user="l2ggy" aria-label="GitHub contribution heatmap">
          <img class="hero-heatmap" id="github-heatmap" src="" alt="GitHub contribution heatmap" loading="lazy" />
        </div>
      </section>

      <section class="section" id="education">
        <h2>Education</h2>
        <div class="entries" data-source="education.json" data-kind="entry"></div>
      </section>

      <section class="section" id="experience">
        <h2>Experience</h2>
        <div class="entries" data-source="experience.json" data-kind="entry"></div>
      </section>

      <section class="section" id="stats" data-leetcode-user="lagsterino" data-monkeytype-user="laggy">
        <h2>Stats</h2>
        <div class="stats-list">
          <article class="stats-item subsection-item">
            <h3>LeetCode</h3>
            <div class="percentile-viz" id="leetcode-percentile" hidden></div>
            <div class="stats-copy">
              <p id="leetcode-solved">Loading…</p>
              <p id="leetcode-contest">Loading…</p>
            </div>
          </article>
          <article class="stats-item subsection-item">
            <h3>Monkeytype</h3>
            <div class="percentile-viz" id="monkeytype-percentile" hidden></div>
            <div class="stats-copy">
              <p id="monkeytype-summary">Loading…</p>
              <p id="monkeytype-pb">Loading…</p>
            </div>
          </article>
        </div>
      </section>
      <section class="section" id="projects">
        <h2>Projects</h2>
        <div class="entries" data-source="projects.json" data-kind="project"></div>
      </section>

      <section class="section" id="leadership">
        <h2>Leadership</h2>
        <div class="entries leadership-list" data-source="leadership.json" data-kind="leadership"></div>
      </section>

      <section class="section" id="contact">
        <h2>Contact</h2>
        <div class="entries" data-source="contact.json" data-kind="contact"></div>
      </section>
    </main>

    <footer class="bar bottombar">
      <div class="container bar-content footer-content">
        <p>© 2026 Boris Kafidov</p>
        <nav class="footer-links" aria-label="External profile links">
          <a class="text-btn" href="https://linkedin.com/in/laggy" aria-label="LinkedIn" title="LinkedIn">LinkedIn</a>
          <a class="text-btn" href="https://github.com/l2ggy" aria-label="GitHub" title="GitHub">GitHub</a>
          <a class="text-btn" href="https://leetcode.com/u/lagsterino/" aria-label="LeetCode" title="LeetCode">LeetCode</a>
          <a class="text-btn" href="https://monkeytype.com/profile/laggy" aria-label="Monkeytype" title="Monkeytype">Monkeytype</a>
          <a class="text-btn" href="mailto:borya@kafidov.com" aria-label="Email" title="Email">Email</a>
        </nav>
        <nav class="footer-links footer-webring" aria-label="Webring navigation">
          <a class="text-btn" href="https://webring.ca/prev/boris-kafidov" aria-label="Previous webring site" title="Previous webring site">←</a>
          <a class="text-btn" href="https://webring.ca" aria-label="webring.ca" title="webring.ca">🍁</a>
          <a class="text-btn" href="https://webring.ca/next/boris-kafidov" aria-label="Next webring site" title="Next webring site">→</a>
        </nav>
      </div>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
