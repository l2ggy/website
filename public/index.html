<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Template</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="bar topbar">
      <div class="container topbar-content">
        <a class="logo-slot" href="#" aria-label="Logo placeholder">Logo</a>
        <div class="topbar-actions">
          <button class="btn icon-btn toggle-btn" id="theme-toggle" type="button" aria-label="Switch theme"></button>
          <a class="btn icon-btn" href="resume.pdf" aria-label="Resume">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h7l5 5v13H7zM14 3v5h5M9 12h8M9 16h8" /></svg>
          </a>
        </div>
      </div>
    </header>

    <main class="container layout">
      <section class="hero">
        <h1>Your Name</h1>
        <p>One-page portfolio placeholder template.</p>
      </section>

      <section class="section" id="education">
        <h2>Education</h2>
        <div class="entries" data-source="education.json" data-kind="entry"></div>
      </section>

      <section class="section" id="experience">
        <h2>Experience</h2>
        <div class="entries" data-source="experience.json" data-kind="entry"></div>
      </section>

      <section class="section" id="projects">
        <h2>Projects</h2>
        <div class="entries" data-source="projects.json" data-kind="project"></div>
      </section>

      <section class="section">
        <h2>Volunteer</h2>
        <p>Organization placeholder · Role placeholder · Contribution placeholder</p>
      </section>

      <section class="section">
        <h2>Contact me</h2>
        <p>placeholder@email.com</p>
      </section>
    </main>

    <footer class="bar bottombar">
      <div class="container bar-content footer-content">
        <p>© 2026 Your Name</p>
        <nav class="footer-links" aria-label="External profile links">
          <a class="btn icon-btn" href="#" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 9v8M7 6h.01M11 17v-5a2 2 0 0 1 4 0v5M4 9h3v8H4M11 9h3v1" /></svg>
          </a>
          <a class="btn icon-btn" href="#" aria-label="GitHub">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 0 0-3 17.5V17h-1.5v-2H9v-1c0-2 1-3 3-3 .9 0 1.8.2 1.8.2v2H13c-1 0-1.3.6-1.3 1.2V15h2.2l-.3 2h-1.9v3.5A9 9 0 0 0 12 3" /></svg>
          </a>
          <a class="btn icon-btn" href="#" aria-label="LeetCode">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 4 8 11l7 7M10 11h8" /></svg>
          </a>
          <a class="btn icon-btn" href="mailto:placeholder@email.com" aria-label="Email">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v10H4zM4 8l8 6 8-6" /></svg>
          </a>
        </nav>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
